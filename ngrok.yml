# ============================================================
# Averroes — ngrok Tunnel Configuration (v3)
#
# Exposes the frontend (port 3000) publicly via ngrok.
# The frontend's Next.js rewrites handle proxying /api/* to
# the backend server-side, so tunneling only port 3000 is
# sufficient for full app access.
#
# Setup (one-time):
#   ngrok config add-authtoken <your_token>
#   Get your token at: https://dashboard.ngrok.com/get-started/your-authtoken
#
# Usage:
#   ngrok start averroes               # Start the tunnel defined below
#   ngrok http 3000                    # Quick one-liner alternative
#
# ngrok dashboard (inspect traffic):
#   http://localhost:4040
# ============================================================

version: "3"

# Usage: ngrok start averroes --config "$HOME/Library/Application Support/ngrok/ngrok.yml" --config ngrok.yml
# (macOS stores the user config with your authtoken at the path above)

tunnels:
  averroes:
    proto: http
    addr: 3000
    inspect: true
    # Uncomment to give the tunnel a stable subdomain (paid plans):
    # domain: your-subdomain.ngrok.app
